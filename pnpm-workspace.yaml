packages:
  - packages/*

# Single source of truth for the SignalX core version the router builds against.
# `^0.12.0` == `>=0.12.0 <0.13.0` (ONE minor). @sigx/reactivity keeps reactive
# state in module-local variables, so two physical copies break reactivity; the
# single-minor range forces pnpm to hoist ONE copy. Bump this one block to move
# the whole repo to a new core minor. Consumed via `"catalog:"` in package.json.
catalog:
  "@sigx/reactivity": ^0.12.0
  "@sigx/runtime-core": ^0.12.0
  "@sigx/runtime-dom": ^0.12.0
  "@sigx/vite": ^0.12.0
  sigx: ^0.12.0

onlyBuiltDependencies:
  - esbuild
